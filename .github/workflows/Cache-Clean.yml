name: Cache-Clean

on:
  #自动清理：每周一早上4点
  #schedule:
    #- cron: 0 20 * * 0
  #手动清理
  workflow_dispatch:

permissions: write-all

env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 查看项目
        uses: actions/checkout@main

      - name: 清理缓存
        run: gh cache delete --all
